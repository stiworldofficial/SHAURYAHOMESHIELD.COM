<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shauryahomeshield | Home</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } } } }
        // REPLACE WITH YOUR GOOGLE SCRIPT URL
        const GOOGLE_SCRIPT_URL = "YOUR_GOOGLE_APPS_SCRIPT_WEB_APP_URL_HERE";
    </script>

    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #e5e7eb; }
        ::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
        
        body { background: radial-gradient(circle at 50% 10%, #ffffff 0%, #f5f5f5 60%, #e5e5e5 100%); overflow-x: hidden; }
        #main-wrapper { transition: transform 0.6s, opacity 0.6s; }
        body.menu-open #main-wrapper { transform: scale(0.96) translateY(-1vh); opacity: 0.8; filter: blur(4px); pointer-events: none; }
        
        .dynamic-island { background: rgba(255, 255, 255, 0.75); backdrop-filter: blur(20px); border: 1px solid rgba(0, 0, 0, 0.05); }
        .hero-slide { opacity: 0; transition: opacity 1.5s ease-in-out; z-index: 1; }
        .hero-slide.active { opacity: 1; z-index: 2; }
        
        .card-11d { transform-style: preserve-3d; perspective: 1000px; }
        .glare { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 50; mix-blend-mode: overlay; }
        
        /* Modals setup */
        .modal-overlay { background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(5px); }
    </style>
</head>
<body class="font-sans pt-24"> 

    <div id="main-wrapper">
        
        <div class="fixed top-4 w-full z-50 flex justify-center px-4" id="navbar-wrapper">
            <nav class="dynamic-island w-full max-w-6xl rounded-[2.5rem] px-6 py-3 flex justify-between items-center shadow-lg">
                <div class="flex items-center cursor-pointer group">
                    <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-blue-600 to-cyan-400 flex items-center justify-center shadow-md">
                        <span class="text-white font-bold">SH</span>
                    </div>
                    <span class="hidden md:block font-bold text-gray-800 ml-3">Shaurya Shield</span>
                </div>
                
                <div class="hidden md:flex items-center space-x-10">
                    <a href="#home" class="text-sm font-bold text-gray-600 hover:text-blue-600">Home</a>
                    <a href="#services" class="text-sm font-bold text-gray-600 hover:text-blue-600">Services</a>
                    <a href="store.html" class="text-sm font-bold text-gray-600 hover:text-blue-600">Store</a>
                </div>
                
                <div class="flex items-center gap-4">
                    <button onclick="toggleProfileModal()" class="w-10 h-10 rounded-full bg-gray-100 border border-gray-200 hover:bg-gray-200 transition-colors z-10 flex items-center justify-center">
                        <i id="user-icon" class="fa-solid fa-user text-gray-700"></i>
                    </button>
                </div>
            </nav>
        </div>

        <!-- AUTH MODAL -->
        <div id="auth-modal" class="fixed inset-0 z-[2000] hidden flex items-center justify-center p-4">
            <div class="absolute inset-0 modal-overlay cursor-pointer" onclick="closeAuthModal()"></div>
            <div class="relative bg-white rounded-3xl w-full max-w-md p-8 shadow-2xl">
                <button onclick="closeAuthModal()" class="absolute top-4 right-4 text-gray-400 hover:text-red-500"><i class="fa-solid fa-xmark"></i></button>
                <h3 class="text-2xl font-black mb-2" id="auth-title">Create Account</h3>
                <p class="text-gray-500 mb-6 text-sm">Services access karne ke liye login karein.</p>
                
                <form id="auth-form" class="space-y-4">
                    <input type="hidden" id="auth-mode" value="signup">
                    <input type="text" id="reg-name" placeholder="Full Name" required class="w-full px-4 py-3 rounded-xl border bg-gray-50 outline-none signup-only">
                    <input type="email" id="reg-email" placeholder="Email Address" required class="w-full px-4 py-3 rounded-xl border bg-gray-50 outline-none">
                    <input type="tel" id="reg-phone" placeholder="Phone Number" required class="w-full px-4 py-3 rounded-xl border bg-gray-50 outline-none signup-only">
                    <textarea id="reg-address" placeholder="Full Address" required class="w-full px-4 py-3 rounded-xl border bg-gray-50 outline-none signup-only"></textarea>
                    <input type="password" id="reg-password" placeholder="Password" required class="w-full px-4 py-3 rounded-xl border bg-gray-50 outline-none">
                    
                    <button type="submit" id="auth-submit-btn" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl hover:bg-blue-700 transition-all">Sign Up</button>
                </form>
                <div class="mt-4 text-center">
                    <button onclick="switchAuthMode()" id="auth-switch-btn" class="text-sm text-blue-600 font-bold">Already have an account? Login</button>
                </div>
            </div>
        </div>

        <!-- PROFILE DASHBOARD MODAL -->
        <div id="profile-modal" class="fixed inset-0 z-[2000] hidden flex items-center justify-center p-4">
            <div class="absolute inset-0 modal-overlay cursor-pointer" onclick="closeProfileModal()"></div>
            <div class="relative bg-white rounded-3xl w-full max-w-md p-8 shadow-2xl">
                <button onclick="closeProfileModal()" class="absolute top-4 right-4 text-gray-400 hover:text-red-500"><i class="fa-solid fa-xmark"></i></button>
                
                <div class="flex items-center gap-4 mb-6 border-b pb-4">
                    <div class="w-16 h-16 rounded-full bg-blue-100 flex items-center justify-center text-blue-600 text-2xl font-bold"><i class="fa-solid fa-user-check"></i></div>
                    <div><h3 class="text-xl font-black" id="profile-name">User</h3><p class="text-gray-500 text-sm" id="profile-phone">+91</p></div>
                </div>
                
                <div class="grid grid-cols-2 gap-4 mb-6">
                    <div class="bg-gray-50 p-4 rounded-xl text-center border">
                        <h4 class="text-3xl font-black text-blue-600" id="total-bookings">0</h4><p class="text-xs text-gray-500 font-bold uppercase">Bookings</p>
                    </div>
                    <div class="bg-gray-50 p-4 rounded-xl text-center border">
                        <h4 class="text-3xl font-black text-green-600" id="success-bookings">0</h4><p class="text-xs text-gray-500 font-bold uppercase">Success</p>
                    </div>
                </div>

                <div class="max-h-40 overflow-y-auto mb-6 text-sm" id="booking-history-list"></div>
                <button onclick="logout()" class="w-full bg-red-50 text-red-600 font-bold py-3 rounded-xl hover:bg-red-600 hover:text-white transition-all">Logout</button>
            </div>
        </div>

        <!-- Hero Slider -->
        <section id="home" class="relative w-full aspect-video max-w-[1920px] mx-auto bg-black overflow-hidden shadow-xl z-10">
            <img src="https://images.unsplash.com/photo-1621905252507-b35492cc74b4?q=80&w=1920&auto=format&fit=crop" class="hero-slide active absolute inset-0 w-full h-full object-cover">
            <img src="https://images.unsplash.com/photo-1500382017468-9049fed747ef?q=80&w=1920&auto=format&fit=crop" class="hero-slide absolute inset-0 w-full h-full object-cover">
            <img src="https://images.unsplash.com/photo-1558611848-73f7eb4001a1?q=80&w=1920&auto=format&fit=crop" class="hero-slide absolute inset-0 w-full h-full object-cover">
        </section>

        <!-- Services Section -->
        <section id="services" class="py-10 md:py-24 relative px-4 sm:px-6">
            <div class="max-w-6xl mx-auto">
                <div class="text-center mb-8 md:mb-16"><h2 class="text-4xl md:text-5xl font-black tracking-tight text-gray-900 mb-4">Serv<span class="text-blue-600">ices</span></h2></div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 md:gap-10">
                    <a href="electric-fencing.html" class="card-11d block w-full h-[250px] rounded-[2.5rem] border border-gray-200 bg-white shadow-md relative overflow-hidden">
                        <img src="https://images.unsplash.com/photo-1500382017468-9049fed747ef?q=80&w=800&auto=format&fit=crop" class="w-full h-full object-cover opacity-90">
                        <div class="absolute bottom-4 left-4 bg-white/90 backdrop-blur-md px-4 py-2 rounded-xl shadow-lg"><h3 class="font-bold">Zhatka Machine</h3></div>
                    </a>
                    <a href="ac-service.html" class="card-11d block w-full h-[250px] rounded-[2.5rem] border border-gray-200 bg-white shadow-md relative overflow-hidden">
                        <img src="https://images.unsplash.com/photo-1527689638836-411945a2b57c?q=80&w=800&auto=format&fit=crop" class="w-full h-full object-cover opacity-90">
                        <div class="absolute bottom-4 left-4 bg-white/90 backdrop-blur-md px-4 py-2 rounded-xl shadow-lg"><h3 class="font-bold">AC Services</h3></div>
                    </a>
                    <a href="tank-alarm.html" class="card-11d block w-full h-[250px] rounded-[2.5rem] border border-gray-200 bg-white shadow-md relative overflow-hidden">
                        <img src="https://images.unsplash.com/photo-1558611848-73f7eb4001a1?q=80&w=800&auto=format&fit=crop" class="w-full h-full object-cover opacity-90">
                        <div class="absolute bottom-4 left-4 bg-white/90 backdrop-blur-md px-4 py-2 rounded-xl shadow-lg"><h3 class="font-bold">Tank Alarm</h3></div>
                    </a>
                    <a href="store.html" class="card-11d block w-full h-[250px] rounded-[2.5rem] border border-gray-200 bg-white shadow-md relative overflow-hidden">
                        <img src="https://images.unsplash.com/photo-1580983546522-837890b0d912?q=80&w=800&auto=format&fit=crop" class="w-full h-full object-cover opacity-90">
                        <div class="absolute bottom-4 left-4 bg-white/90 backdrop-blur-md px-4 py-2 rounded-xl shadow-lg"><h3 class="font-bold">Spare Parts</h3></div>
                    </a>
                </div>
            </div>
        </section>
    </div>

    <script>
        // --- Slider ---
        const slides = document.querySelectorAll('.hero-slide');
        if(slides.length > 0) {
            let currentSlide = 0;
            setInterval(() => { slides[currentSlide].classList.remove('active'); currentSlide = (currentSlide + 1) % slides.length; slides[currentSlide].classList.add('active'); }, 5000); 
        }

        // --- Auth Logic ---
        function checkLoginState() {
            const user = JSON.parse(localStorage.getItem('shaurya_user'));
            const icon = document.getElementById('user-icon');
            if(user) { icon.classList.replace('fa-user', 'fa-user-check'); icon.classList.add('text-green-500'); return true; } 
            else { icon.classList.replace('fa-user-check', 'fa-user'); icon.classList.remove('text-green-500'); return false; }
        }
        window.onload = checkLoginState;

        function toggleProfileModal() {
            if(checkLoginState()) {
                const user = JSON.parse(localStorage.getItem('shaurya_user'));
                document.getElementById('profile-name').innerText = user.name; document.getElementById('profile-phone').innerText = user.phone;
                let history = JSON.parse(localStorage.getItem('shaurya_history')) || [];
                document.getElementById('total-bookings').innerText = history.length; document.getElementById('success-bookings').innerText = history.length;
                
                let historyHTML = '';
                history.forEach(item => { historyHTML += `<div class="p-2 border-b border-gray-100 flex justify-between"><span class="font-bold">${item.id}</span> <span class="text-gray-500">${item.type}</span></div>`; });
                document.getElementById('booking-history-list').innerHTML = historyHTML || '<p class="text-gray-400 text-center">No bookings yet</p>';
                document.getElementById('profile-modal').classList.remove('hidden');
            } else { document.getElementById('auth-modal').classList.remove('hidden'); }
        }

        function closeProfileModal() { document.getElementById('profile-modal').classList.add('hidden'); }
        function closeAuthModal() { document.getElementById('auth-modal').classList.add('hidden'); }

        function switchAuthMode() {
            const mode = document.getElementById('auth-mode');
            const onlySignup = document.querySelectorAll('.signup-only');
            if(mode.value === 'signup') {
                mode.value = 'login';
                document.getElementById('auth-title').innerText = 'Login';
                document.getElementById('auth-submit-btn').innerText = 'Login';
                document.getElementById('auth-switch-btn').innerText = 'Create new account';
                onlySignup.forEach(el => { el.style.display = 'none'; el.removeAttribute('required'); });
            } else {
                mode.value = 'signup';
                document.getElementById('auth-title').innerText = 'Create Account';
                document.getElementById('auth-submit-btn').innerText = 'Sign Up';
                document.getElementById('auth-switch-btn').innerText = 'Already have an account? Login';
                onlySignup.forEach(el => { el.style.display = 'block'; el.setAttribute('required', 'true'); });
            }
        }

        function logout() { localStorage.removeItem('shaurya_user'); closeProfileModal(); checkLoginState(); }

        document.getElementById('auth-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('auth-submit-btn');
            const mode = document.getElementById('auth-mode').value;
            const originalText = btn.innerText;
            btn.innerHTML = 'Processing...'; btn.disabled = true;

            const formData = new URLSearchParams();
            formData.append('action', mode);
            formData.append('email', document.getElementById('reg-email').value);
            formData.append('password', document.getElementById('reg-password').value);
            
            if(mode === 'signup') {
                formData.append('name', document.getElementById('reg-name').value);
                formData.append('phone', document.getElementById('reg-phone').value);
                formData.append('address', document.getElementById('reg-address').value);
            }

            fetch(GOOGLE_SCRIPT_URL, { method: 'POST', body: formData })
            .then(res => res.json()).then(data => {
                if(data.status === 'success') {
                    if(mode === 'signup') {
                        alert("Account created! Please login now.");
                        switchAuthMode(); // Switch to login view
                    } else {
                        // User successfully logged in
                        localStorage.setItem('shaurya_user', JSON.stringify(data.user));
                        closeAuthModal(); checkLoginState();
                    }
                } else { alert(data.message); }
                btn.innerHTML = originalText; btn.disabled = false;
            }).catch(err => { alert("Error connecting to server."); btn.innerHTML = originalText; btn.disabled = false; });
        });
    </script>
</body>
</html>
