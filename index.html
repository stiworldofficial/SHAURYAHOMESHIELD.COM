<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shaurya Home Shield - Starting...</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind Config -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { 
                        sans: ['Inter', 'sans-serif']
                    },
                    colors: {
                        'brand-blue': '#0A84FF', // Apple-like blue accent
                        'bg-light': '#fbfbfc',
                    }
                }
            }
        }
    </script>

    <style>
        /* --- Clean Minimalist Body --- */
        body {
            margin: 0;
            overflow: hidden;
            background-color: #fbfbfc; /* Very clean off-white */
            background-image: radial-gradient(circle at 50% 0%, #ffffff 0%, #fbfbfc 60%, #f0f0f5 100%);
            color: #1f2937;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            /* Exit transition */
            transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1), filter 0.8s ease;
        }

        body.exit-mode {
            opacity: 0;
            filter: blur(8px);
        }

        /* --- Smooth Reveal Animations --- */
        .reveal-up {
            opacity: 0;
            transform: translateY(20px);
            animation: slide-up 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .delay-1 { animation-delay: 0.2s; }
        .delay-2 { animation-delay: 0.4s; }
        .delay-3 { animation-delay: 0.6s; }

        @keyframes slide-up {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* --- Logo Icon Soft Glow --- */
        .icon-container {
            width: 88px;
            height: 88px;
            background: #ffffff;
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03), 0 1px 3px rgba(0,0,0,0.02);
            border: 1px solid rgba(0,0,0,0.02);
            margin-bottom: 24px;
        }

        /* --- Ultra Sleek Progress Bar --- */
        .progress-track {
            width: 220px;
            height: 3px;
            background: rgba(0, 0, 0, 0.06);
            border-radius: 4px;
            overflow: hidden;
            margin: 0 auto;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: #0A84FF;
            border-radius: 4px;
            /* Smooth varying speed for realistic loading feel */
            animation: load-progress 3.2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        @keyframes load-progress {
            0% { width: 0%; }
            15% { width: 10%; }
            45% { width: 55%; }
            70% { width: 85%; }
            100% { width: 100%; }
        }

        /* Text Fade transition for status */
        .status-text {
            transition: opacity 0.3s ease;
        }
    </style>
</head>
<body>

    <div class="flex flex-col items-center text-center w-full max-w-sm px-6">
        
        <!-- Clean Logo Icon -->
        <div class="reveal-up icon-container">
            <!-- Icon image (Ensure path is correct) -->
            <img src="shsl.png" class="w-14 h-14 object-contain" alt="SHS Icon">
        </div>

        <!-- Brand Name -->
        <div class="reveal-up delay-1 mb-2">
            <!-- Text Logo image (Ensure path is correct) -->
            <img src="shslname.png" class="h-6 sm:h-7 object-contain mx-auto" alt="Shaurya Home Shield">
        </div>

        <!-- Corporate Subtitle -->
        <div class="reveal-up delay-2 mb-12">
            <p class="text-[10px] sm:text-xs font-semibold text-gray-400 tracking-[0.25em] uppercase">
                Premium Electrical Solutions
            </p>
        </div>

        <!-- Minimalist Loading Section -->
        <div class="reveal-up delay-3 w-full">
            <div class="progress-track">
                <div class="progress-bar"></div>
            </div>
            
            <p id="status-text" class="status-text mt-5 text-[13px] text-gray-500 font-medium tracking-wide">
                Initializing...
            </p>
        </div>

    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const statusText = document.getElementById("status-text");
            
            // Professional loading phases
            const loadingPhases = [
                { time: 0, text: "Initializing..." },
                { time: 1000, text: "Loading Secure Environment..." },
                { time: 2200, text: "Syncing Services..." },
                { time: 3200, text: "Ready." }
            ];

            // Change text dynamically based on time
            loadingPhases.forEach(phase => {
                setTimeout(() => {
                    // Fade out briefly
                    statusText.style.opacity = 0;
                    
                    setTimeout(() => {
                        statusText.innerText = phase.text;
                        // Fade in
                        statusText.style.opacity = 1;
                    }, 300); // 300ms fade transition
                }, phase.time);
            });

            // Redirect logic
            // Total display time: 4 seconds
            setTimeout(() => {
                // Smooth fade out & blur effect
                document.body.classList.add('exit-mode');
                
                // Wait for CSS transition to finish before changing page
                setTimeout(() => {
                    window.location.href = "main.html"; 
                }, 800); 

            }, 4000); 
        });
    </script>
</body>
</html>
